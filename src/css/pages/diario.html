<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Diário Emocional</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
  <h1>Diário Emocional</h1>

  <label>O que aconteceu?</label>
  <textarea id="situacao"></textarea>

  <label>Como você está se sentindo?</label>
  <input type="text" id="emocao" placeholder="Ex: ansiedade, tristeza, medo">

  <label>Intensidade da emoção</label>
  <select id="intensidade">
    <option value="1">1 - Leve</option>
    <option value="5">5 - Média</option>
    <option value="10">10 - Muito forte</option>
  </select>

  <button onclick="salvarDiario()">Salvar no diário</button>

  <div id="resultado" class="resultado"></div>

  <a href="index.html" class="voltar">Voltar</a>
</main>

<script src="script.js"></script>
</body>
</html>
